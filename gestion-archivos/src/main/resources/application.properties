


spring.application.name=gestion-archivos

# ===========================
# MySQL Configuration
# ===========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gestion_archivo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=10000
spring.datasource.username=root
spring.datasource.password=1034576920
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# HikariCP Config (Producción)
# ===========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# 10 minutos
spring.datasource.hikari.idle-timeout=600000

# 30 minutos
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=10000

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===========================
# Server
# ===========================
server.port=8080
server.servlet.context-path=/
server.tomcat.connection-timeout=300000
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10

# ===========================
# Upload de Archivos
# ===========================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ===========================
# Correcciones
# ===========================
app.correcciones.upload-dir=correcciones

# ===========================
# Temporal Data Cleanup
# ===========================
app.temporal-data-retention-minutes=10
app.cleanup.interval.ms=600000

# ===========================
# Logging
# ===========================
logging.level.root=WARN
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN
logging.level.com.sivco.gestion_archivos=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
